# SwiftLint configuration for suzu.
# Guardrails, not gatekeeping.

included:
  - Suzu

excluded:
  - build
  - .build
  - scripts

disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - closure_spacing
  - empty_count
  - empty_string
  - implicit_return
  - vertical_whitespace_closing_braces
  - redundant_nil_coalescing
  - convenience_type
  - first_where
  - last_where
  - sorted_first_last
  - toggle_bool
  - contains_over_first_not_nil
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - flatmap_over_map_reduce
  - reduce_into
  - yoda_condition
  - identical_operands
  - overridden_super_call
  - prohibited_super_call
  - fatal_error_message
  - force_unwrapping

line_length:
  warning: 140
  error: 280
  ignores_urls: true
  ignores_comments: true
  ignores_function_declarations: true

function_body_length:
  warning: 80
  error: 250

type_body_length:
  warning: 600
  error: 1500

file_length:
  warning: 600
  error: 1500

cyclomatic_complexity:
  warning: 15
  error: 120

large_tuple:
  warning: 3
  error: 5

identifier_name:
  allowed_symbols: ["_"]
  validates_start_with_lowercase: warning
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - r
    - n

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60

force_unwrapping:
  severity: warning

force_cast:
  severity: warning

force_try:
  severity: warning
